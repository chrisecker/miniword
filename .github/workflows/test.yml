name: Tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]"
      - name: Bundle cairo (wxPython >=4.2.2 dropped the bundled DLL upstream)
        run: |
          $sitePackages = python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])"
          powershell -File installer/bundle_cairo_windows.ps1 $sitePackages
      - run: python test_all.py
