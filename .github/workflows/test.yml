name: Tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]"
      - run: python test_all.py
