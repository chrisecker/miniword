name: Release builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]" pyinstaller
      - name: Build with PyInstaller
        run: >
          pyinstaller miniword.py --name miniword --windowed --onedir
          --icon miniword/icons/miniword.ico
          --add-data "miniword/icons;miniword/icons"
          --add-data "miniword/plugins;miniword/plugins"
          --manifest installer/miniword.manifest
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: ISCC /DMyAppVersion=${{ github.ref_name }} installer/miniword.iss
      - uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe

  macos:
    needs: windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]" pyinstaller
      - name: Build .icns from iconset
        run: iconutil -c icns miniword/icons/miniword.iconset -o miniword/icons/miniword.icns
      - name: Build with PyInstaller
        # cairocffi needs libcairo; on macOS this comes from Homebrew, not wxPython
        run: |
          brew install cairo
          pyinstaller miniword.py --name miniword --windowed --onedir \
            --icon miniword/icons/miniword.icns \
            --add-data "miniword/icons:miniword/icons" \
            --add-data "miniword/plugins:miniword/plugins"
      - name: Create .dmg
        run: |
          mkdir -p dist/dmg
          cp -R dist/miniword.app dist/dmg/
          hdiutil create -volname miniword -srcfolder dist/dmg -ov -format UDZO dist/miniword-${{ github.ref_name }}.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/miniword-*.dmg

  pypi:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check pyproject.toml version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python -c "from miniword.version import __version__; print(__version__)")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $pkg_version"
            exit 1
          fi
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
