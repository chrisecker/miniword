name: Release builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]" pyinstaller
      - name: Build with PyInstaller
        run: >
          pyinstaller miniword.py --name MiniWord --windowed --onedir
          --icon miniword/icons/miniword.ico
          --add-data "miniword/icons;miniword/icons"
          --add-data "miniword/plugins;miniword/plugins"
          --hidden-import mistune
          --manifest installer/miniword.manifest
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: ISCC /DMyAppVersion=${{ github.ref_name }} installer/miniword.iss
      - uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe

  macos:
    needs: windows
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ".[full]" pyinstaller
      - name: Build .icns from iconset
        run: iconutil -c icns miniword/icons/miniword.iconset -o miniword/icons/miniword.icns
      - name: Build with PyInstaller
        # cairocffi needs libcairo; fontfinder.py shells out to fc-match for
        # font resolution -- both come from Homebrew on macOS, not wxPython
        run: |
          brew install cairo fontconfig dylibbundler
          pyinstaller miniword.py --name MiniWord --windowed --onedir \
            --icon miniword/icons/miniword.icns \
            --add-data "miniword/icons:miniword/icons" \
            --add-data "miniword/plugins:miniword/plugins" \
            --hidden-import mistune
      - name: Bundle cairo (PyInstaller can't see its dlopen-by-name load)
        run: bash installer/bundle_cairo_macos.sh dist/MiniWord.app
      - name: Bundle fontconfig (PyInstaller can't see the fc-match subprocess call)
        run: bash installer/bundle_fontconfig_macos.sh dist/MiniWord.app
      - name: Create .dmg
        run: |
          mkdir -p dist/dmg
          cp -R dist/MiniWord.app dist/dmg/
          hdiutil create -volname MiniWord -srcfolder dist/dmg -ov -format UDZO dist/MiniWord-${{ github.ref_name }}.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/MiniWord-*.dmg

  pypi:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check pyproject.toml version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python -c "import ast, pathlib; src=pathlib.Path('miniword/__init__.py').read_text(); print(next(ast.literal_eval(n.value) for n in ast.walk(ast.parse(src)) if isinstance(n, ast.Assign) and any(getattr(t,'id','')=='__version__' for t in n.targets)))")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $pkg_version"
            exit 1
          fi
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
